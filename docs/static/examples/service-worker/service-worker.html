<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="./service-worker.js"></script>
  </head>
  <body ng-app="serviceWorkerDemo">
    <section ng-controller="ServiceWorkerCtrl">
      <p data-testid="support">{{ supportText }}</p>
      <p data-testid="status">{{ statusText }}</p>
      <p data-testid="message">{{ messageText }}</p>
      <p data-testid="update">{{ updateText }}</p>

      <button type="button" data-testid="register" ng-click="register()">
        Register worker
      </button>
      <button type="button" data-testid="message-worker" ng-click="ping()">
        Message worker
      </button>
      <button type="button" data-testid="stage-update" ng-click="stageUpdate()">
        Stage update
      </button>
      <button
        type="button"
        data-testid="activate-update"
        ng-click="activateUpdate()"
      >
        Activate update
      </button>
      <button type="button" data-testid="reload" ng-click="reload()">
        Reload
      </button>
    </section>
  </body>
</html>
