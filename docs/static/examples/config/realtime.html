<!doctype html>
<html>
  <head>
    <script type="module" src="/utils/source-bootstrap.js" data-angular-ts-entry="./realtime.js"></script>
  </head>
  <body ng-app="realtimeConfigDemo">
    <section ng-controller="RealtimeConfigCtrl as vm">
      <p>SSE reconnect delay: {{ vm.sseRetryDelay }}ms</p>
      <p>WebSocket protocols: {{ vm.websocketProtocols }}</p>
      <p>WebTransport reconnect: {{ vm.webTransportReconnect }}</p>
      <p>Cleanup owner: {{ vm.cleanupOwner }}</p>
      <p>Native escape hatch: {{ vm.nativeEscapeHatch }}</p>
      <code>{{ vm.cleanupExample }}</code>
    </section>
  </body>
</html>
