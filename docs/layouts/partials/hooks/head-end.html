<script src="https://cdn.jsdelivr.net/npm/@angular-wave/angular.ts@0.29.2/dist/angular-ts.umd.js"></script>
<script>
  (function () {
    const SIDEBAR_ID = "td-section-nav";
    const TOGGLE_SELECTOR = ".td-sidebar__toggle[data-bs-toggle='collapse'][data-bs-target='#td-section-nav']";
    const MEDIA_QUERY = "(max-width: 767.98px)";
    const mobileQuery = window.matchMedia(MEDIA_QUERY);
    const isMobile = () => mobileQuery.matches;
    const linksSelector = ".td-sidebar-link";
    const overlayClass = "td-mobile-sidebar-overlay";
    const bodyOpenClass = "ats-mobile-sidebar-open";
    const KEY_ESCAPE = "Escape";

    const setOverlayState = (sidebar, overlay) => {
      const show = isMobile() && sidebar.classList.contains("show");
      if (show) {
        overlay.classList.add("is-visible");
        document.body.classList.add(bodyOpenClass);
      } else {
        overlay.classList.remove("is-visible");
        document.body.classList.remove(bodyOpenClass);
      }
    };

    const closeSidebar = (sidebar, toggleButton) => {
      if (!isMobile() || !sidebar.classList.contains("show")) return;
      toggleButton.click();
    };

    const handleKeyDown = (event, sidebar, toggleButton) => {
      if (event.key !== KEY_ESCAPE || !isMobile()) return;
      closeSidebar(sidebar, toggleButton);
    };

    const setCloseHook = (sidebar, toggleButton, overlay) => {
      const onToggle = (event) => {
        if (event.target !== overlay) return;
        closeSidebar(sidebar, toggleButton);
      };
      overlay.addEventListener("click", onToggle);
    };

    const initMobileSidebar = () => {
      const sidebar = document.getElementById(SIDEBAR_ID);
      const toggleButton = document.querySelector(TOGGLE_SELECTOR);

      if (!sidebar || !toggleButton) return;
      if (!document.querySelector(`.${overlayClass}`)) {
        const overlay = document.createElement("button");
        overlay.type = "button";
        overlay.className = overlayClass;
        overlay.setAttribute("aria-label", "Close sidebar");
        document.body.appendChild(overlay);
      }

      const overlay = document.querySelector(`.${overlayClass}`);
      if (!overlay) return;
      setCloseHook(sidebar, toggleButton, overlay);

      const syncOverlay = () => setOverlayState(sidebar, overlay);

      sidebar.addEventListener("shown.bs.collapse", syncOverlay);
      sidebar.addEventListener("hidden.bs.collapse", syncOverlay);
      if (mobileQuery.addEventListener) {
        mobileQuery.addEventListener("change", syncOverlay);
      } else {
        mobileQuery.addListener(syncOverlay);
      }
      syncOverlay();

      sidebar.querySelectorAll(linksSelector).forEach((link) => {
        link.addEventListener("click", () => closeSidebar(sidebar, toggleButton));
      });
      document.addEventListener("keydown", (event) => handleKeyDown(event, sidebar, toggleButton));
    };

    const waitForBootstrap = (callback) => {
      if (window.bootstrap && window.bootstrap.Collapse) {
        callback();
        return;
      }

      const maxAttempts = 100;
      let attempts = 0;

      const check = () => {
        if (window.bootstrap && window.bootstrap.Collapse) {
          callback();
          return;
        }

        if (attempts++ < maxAttempts) {
          setTimeout(check, 50);
        }
      };

      check();
    };

    window.addEventListener("load", () => {
      waitForBootstrap(initMobileSidebar);
    });
  }());
</script>
