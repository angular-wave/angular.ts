<!doctype html>
<html class="platform-web">
  <head>
    <meta charset="utf-8" />
    <title>AngularTS Native Bridge Demo</title>
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/css/angular-animate.css" />
    <link rel="stylesheet" href="/src/directive/http/demo.css" />
    <link rel="stylesheet" href="/src/services/native/native-demo.css" />
    <script type="module" src="/src/index.ts"></script>
    <script>
      window.__isNativeShell = Boolean(window.AngularNative);

      document.addEventListener("DOMContentLoaded", () => {
        if (!window.AngularNative) {
          window.AngularNative = {
            async receive(message) {
              const call = JSON.parse(message);

              setTimeout(() => {
                nativeResult(call)
                  .then((result) => {
                    window.angularNative.receive({
                      id: call.id,
                      ok: true,
                      result,
                    });
                  })
                  .catch((error) => {
                    window.angularNative.receive({
                      id: call.id,
                      ok: false,
                      error: error.message || String(error),
                    });
                  });
              }, 120);
            },
          };
        }

        async function nativeResult(call) {
          if (call.target === "navigation") {
            const fragmentUrl = call.params.fragmentUrl || call.params.url;
            const response = await fetch(fragmentUrl);
            const html = await response.text();
            const historyMethod =
              call.params.action === "replace" ? "replaceState" : "pushState";

            window.history[historyMethod](null, "", call.params.url);

            return {
              target: "#native-view",
              swap: "innerHTML",
              html,
            };
          }

          if (call.target === "component") {
            if (call.method === "unmount") {
              return { ok: true };
            }

            if (
              call.method === "update" &&
              call.params.name === "compose-drawer"
            ) {
              return { swap: "none" };
            }

            if (call.params.name === "compose-drawer") {
              const items = call.params.props.items || [];
              const buttons = items
                .map((item) => {
                  const payload = JSON.stringify({ item }).replace(
                    /'/g,
                    "&#39;",
                  );

                  return `<button type="button" ng-click='demo.selectDrawerRoute(${payload})'>${item.label}</button>`;
                })
                .join("");

              return {
                target: `#${call.params.id}`,
                swap: "innerHTML",
                html: `
                  <details class="native-drawer-fallback">
                    <summary>${call.params.props.text}</summary>
                    <div class="native-drawer-fallback__sheet">
                      <strong>${call.params.props.title}</strong>
                      ${buttons}
                    </div>
                  </details>
                `,
              };
            }

            if (call.params.name === "native-card") {
              const props = call.params.props || {};

              return {
                target: `#${call.params.id}`,
                swap: "innerHTML",
                html: `
                  <article class="native-card-fallback">
                    <div class="native-card-fallback__image"></div>
                    <strong>${props.title}</strong>
                    <p>${props.subtitle}</p>
                  </article>
                `,
              };
            }

            if (call.params.name === "native-image") {
              return {
                target: `#${call.params.id}`,
                swap: "innerHTML",
                html: `<div class="native-card-fallback__image"></div>`,
              };
            }
          }

          return { ok: true };
        }

        class NativeDemoController {
          static $inject = ["$scope", "$http", "$compile"];

          constructor($scope, $http, $compile) {
            this.$scope = $scope;
            this.$http = $http;
            this.$compile = $compile;
            this.drawerRoutes = [
              { label: "Today", route: "/native/demo" },
              { label: "Projects", route: "/native/demo/projects" },
              { label: "Native Card", route: "/native/demo/native-card" },
              { label: "Settings", route: "/native/demo/settings" },
            ];
            this.selectedRoute =
              new URLSearchParams(window.location.search).get("view") ||
              "/native/demo";
          }

          nativeRoute(fragmentUrl, action = "advance") {
            const shellUrl = new URL(window.location.href);

            shellUrl.searchParams.set("view", fragmentUrl);

            return {
              url: `${shellUrl.pathname}${shellUrl.search}`,
              fragmentUrl,
              action,
            };
          }

          async selectDrawerRoute(data) {
            const route = data?.item?.route || "/native/demo";

            this.selectedRoute = route;
            const response = await this.$http.get(route);
            const target = document.getElementById("native-view");
            const shellUrl = new URL(window.location.href);

            shellUrl.searchParams.set("view", route);
            window.history.replaceState(
              null,
              "",
              `${shellUrl.pathname}${shellUrl.search}`,
            );

            const swap = () => {
              target.innerHTML = response.data;
              this.$compile(target)(this.$scope);
              this.$scope.$flushQueue();
            };

            if (!window.__isNativeShell && document.startViewTransition) {
              document.startViewTransition(swap);
            } else {
              swap();
            }
          }
        }

        function ngNativeCardDirective($compile) {
          return {
            restrict: "E",
            terminal: true,
            priority: 1000,
            link(scope, element) {
              const node = element[0] || element;
              const title =
                readChildText(node, "title") || "Random native picture";
              const subtitle =
                readChildText(node, "subtitle") ||
                "ElevatedCard rendered by Android from an AngularTS component host.";
              const host = document.createElement("div");
              const propsId = `nativeCard${scope.$id}_${Math.random()
                .toString(36)
                .slice(2)}`;

              scope[propsId] = {
                title,
                subtitle,
              };

              const image = readNativeImage(node);
              if (image) {
                scope[propsId].image = image;
              }

              host.className = node.getAttribute("class") || "native-card-host";
              host.setAttribute("ng-native-component", "native-card");
              host.setAttribute("data-props", propsId);
              node.replaceWith(host);
              $compile(host)(scope);
            },
          };
        }

        ngNativeCardDirective.$inject = ["$compile"];

        function ngNativeImageDirective($compile) {
          return {
            restrict: "E",
            terminal: true,
            priority: 1000,
            link(scope, element) {
              const node = element[0] || element;

              if (node.closest("ng-native-card")) return;

              const host = document.createElement("div");
              const propsId = `nativeImage${scope.$id}_${Math.random()
                .toString(36)
                .slice(2)}`;

              scope[propsId] = readNativeImageProps(node);
              host.className =
                node.getAttribute("class") || "native-image-host";
              host.setAttribute("ng-native-component", "native-image");
              host.setAttribute("data-props", propsId);
              node.replaceWith(host);
              $compile(host)(scope);
            },
          };
        }

        ngNativeImageDirective.$inject = ["$compile"];

        function readChildText(element, selector) {
          return element.querySelector(selector)?.textContent?.trim();
        }

        function readNativeImage(element) {
          const image = element.querySelector("ng-native-image, native-image");

          if (!image) return undefined;

          return readNativeImageProps(image);
        }

        function readNativeImageProps(image) {
          return {
            contentDescription:
              image.getAttribute("content-description") ||
              image.getAttribute("alt") ||
              "",
            contentScale: image.getAttribute("content-scale") || "crop",
            height: Number(image.getAttribute("height") || 132),
          };
        }

        window.angular
          .module("nativeDemo", [])
          .directive("ngNativeCard", ngNativeCardDirective)
          .directive("ngNativeImage", ngNativeImageDirective)
          .controller("NativeDemoCtrl", NativeDemoController);
      });
    </script>
  </head>
  <body
    class="native-demo-page"
    ng-app="nativeDemo"
    ng-controller="NativeDemoCtrl as demo"
  >
    <main class="demo-shell">
      <section>
        <div
          id="native-initial-view"
          trigger="load"
          target="#native-view"
        ></div>
        <script>
          document
            .getElementById("native-initial-view")
            .setAttribute(
              "ng-get",
              new URLSearchParams(window.location.search).get("view") ||
                "/native/demo",
            );

          if (!window.__isNativeShell) {
            document
              .getElementById("native-view")
              .setAttribute("data-view-transition", "");
          }
        </script>
        <div id="native-view"></div>
      </section>
    </main>
  </body>
</html>
