<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS Web Component React Demo</title>
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/src/services/rest/rest-demo.css" />
    <script type="module">
      import React, { useEffect, useRef, useState } from "react";
      import { createRoot } from "react-dom/client";
      import { classDirective } from "/src/directive/class/class.ts";
      import { ngClickDirective } from "/src/directive/events/events.ts";
      import { defineAngularElement } from "/src/runtime/web-component.ts";

      defineAngularElement("aw-status-card", {
        ngModule: {
          directives: {
            ngClass: classDirective,
            ngClick: ngClickDirective,
          },
        },
        component: {
          shadow: true,
          inputs: {
            active: Boolean,
            count: Number,
            title: String,
          },
          scope: {
            source: "Standalone AngularTS custom element",
          },
          template: `
            <div>
              <style>
                :host {
                  display: block;
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }

                .card {
                  display: grid;
                  gap: 12px;
                  border: 1px solid #d9dde5;
                  border-radius: 8px;
                  background: #ffffff;
                  padding: 18px;
                }

                h2 {
                  margin: 0;
                  color: #202124;
                  font-size: 16px;
                  font-weight: 650;
                  letter-spacing: 0;
                }

                p {
                  margin: 0;
                  color: #475467;
                  font-size: 14px;
                }

                .metric {
                  display: flex;
                  align-items: baseline;
                  gap: 8px;
                }

                .metric strong {
                  color: #202124;
                  font-size: 28px;
                  line-height: 1;
                }

                .badge {
                  justify-self: start;
                  border-radius: 999px;
                  padding: 3px 8px;
                  background: #ecfdf3;
                  color: #027a48;
                  font-size: 12px;
                  font-weight: 650;
                }

                .badge.is-paused {
                  background: #f2f4f7;
                  color: #475467;
                }

                button {
                  min-height: 34px;
                  border: 1px solid #2563eb;
                  border-radius: 6px;
                  background: #2563eb;
                  color: #ffffff;
                  cursor: pointer;
                  font: inherit;
                  font-size: 14px;
                  font-weight: 600;
                  padding: 0 12px;
                }
              </style>
              <article class="card">
                <div>
                  <h2>{{ title }}</h2>
                  <p>{{ source }}</p>
                </div>
                <div class="metric">
                  <strong>{{ count }}</strong>
                  <span>updates from React state</span>
                </div>
                <span class="badge" ng-class="{ 'is-paused': !active }">
                  {{ active ? 'active' : 'paused' }}
                </span>
                <button ng-click="requestIncrement()">Increment from AngularTS</button>
              </article>
            </div>
          `,
          connected({ dispatch, scope }) {
            scope.requestIncrement = () => {
              dispatch("increment", { count: scope.count });
            };
          },
        },
      });

      function AngularStatusCard({ active, count, onIncrement, title }) {
        const elementRef = useRef(null);

        useEffect(() => {
          const element = elementRef.current;

          if (!element) return;

          element.active = active;
          element.count = count;
          element.title = title;
        }, [active, count, title]);

        useEffect(() => {
          const element = elementRef.current;

          if (!element) return;

          element.addEventListener("increment", onIncrement);

          return () => {
            element.removeEventListener("increment", onIncrement);
          };
        }, [onIncrement]);

        return React.createElement("aw-status-card", {
          ref: elementRef,
          "data-testid": "angular-component",
        });
      }

      function Demo() {
        const [active, setActive] = useState(true);
        const [count, setCount] = useState(1);
        const [title, setTitle] = useState("Consumed by React");

        return React.createElement(
          "main",
          null,
          React.createElement(
            "section",
            { className: "workspace" },
            React.createElement(
              "header",
              { className: "toolbar" },
              React.createElement("h1", null, "React consumes AngularTS"),
              React.createElement(
                "div",
                { className: "notice", role: "status" },
                `React state: ${count}`,
              ),
            ),
            React.createElement(
              "section",
              { className: "panel" },
              React.createElement(
                "div",
                { className: "panel-header" },
                React.createElement("h2", null, "React controls"),
              ),
              React.createElement(
                "div",
                { className: "form-grid" },
                React.createElement(
                  "label",
                  null,
                  "Title",
                  React.createElement("input", {
                    value: title,
                    onChange: (event) => setTitle(event.target.value),
                  }),
                ),
                React.createElement(
                  "div",
                  { className: "actions" },
                  React.createElement(
                    "button",
                    {
                      type: "button",
                      onClick: () => setCount((value) => value + 1),
                    },
                    "Increment in React",
                  ),
                  React.createElement(
                    "button",
                    {
                      type: "button",
                      onClick: () => setActive((value) => !value),
                    },
                    active ? "Pause" : "Activate",
                  ),
                ),
              ),
            ),
            React.createElement(
              "section",
              { className: "panel" },
              React.createElement(
                "div",
                { className: "panel-header" },
                React.createElement("h2", null, "AngularTS custom element"),
              ),
              React.createElement(AngularStatusCard, {
                active,
                count,
                title,
                onIncrement: () => setCount((value) => value + 1),
              }),
            ),
          ),
        );
      }

      createRoot(document.getElementById("react-root")).render(
        React.createElement(Demo),
      );
    </script>
  </head>
  <body>
    <div id="react-root"></div>
  </body>
</html>
