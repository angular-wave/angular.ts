<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS</title>
    <link rel="shortcut icon" type="image/png" href="images/favicon.ico" />
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body ng-app>
    <fieldset ng-init="selected = 'hello'">
      <legend>Radio values</legend>
      <input type="radio" ng-model="selected" value="hello" />
      <input type="radio" ng-model="selected" value="unset" />
      {{selected}}
    </fieldset>

    <form
      name="myForm"
      ng-init="checkboxModel = {
        value1 : true,
        value2 : false
      }"
    >
      <label
        >Value1:
        <input type="checkbox" ng-model="checkboxModel.value1" /> </label
      ><br />
      <label
        >Value2:
        <input type="checkbox" ng-model="checkboxModel.value2" /> </label
      ><br />
      <div>value1 = {{checkboxModel.value1}}</div>
      <br />
      <div>value2 = {{checkboxModel.value2}}</div>
      <br />
    </form>

    <fieldset ng-init="drone = 'dewey'">
      <legend>Select a maintenance drone:</legend>
      {{ drone }}
      <div>
        <input type="radio" ng-model="drone" id="huey" value="huey" checked />
        <label for="huey">Huey</label>
      </div>

      <div>
        <input type="radio" ng-model="drone" id="dewey" value="dewey" />
        <label for="dewey">Dewey</label>
      </div>

      <div>
        <input type="radio" ng-model="drone" id="louie" value="louie" />
        <label for="louie">Louie</label>
      </div>
    </fieldset>
  </body>
</html>
