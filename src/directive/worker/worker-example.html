<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS</title>
    <link rel="shortcut icon" type="image/png" href="images/favicon.ico" />
    <script type="module" src="/src/auto.ts"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        class Demo {
          constructor(echo) {
            this.echo = echo;
            this.dispose = this.echo.onMessage((data) => {
              window.alert(data.echo);
            });
          }

          test() {
            this.echo.postMessage("test");
          }
        }
        Demo.$inject = ["echo"];
        window.angular
          .module("todo", [])
          .worker("echo", "/src/directive/worker/echo-worker.ts", {})
          .controller("DemoCtrl", Demo);
      });
    </script>
  </head>
  <body ng-app="todo">
    <div ng-controller="DemoCtrl as $ctrl">
      <button ng-click="$ctrl.test()">Test</button>
    </div>
  </body>
</html>
