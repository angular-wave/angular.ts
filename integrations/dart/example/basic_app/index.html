<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AngularTS Dart Todo Demo</title>
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />
    <script src="/dist/angular-ts.umd.js"></script>
    <script type="module">
      const script = document.createElement("script");
      script.defer = true;
      script.src = "/integrations/dart/example/basic_app/web/main.dart.js";
      document.head.appendChild(script);
    </script>
    <style>
      body {
        font:
          14px/1.5 system-ui,
          sans-serif;
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      section {
        margin: 24px 0;
      }

      button {
        cursor: pointer;
        margin: 4px 6px 4px 0;
      }

      input[type="text"] {
        min-width: 240px;
        padding: 6px 8px;
      }

      .demo-shell {
        border: 1px solid #d7dbe3;
        border-radius: 8px;
        padding: 20px;
      }

      .todo-entry,
      .archive-toggle,
      .todo-row {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .todo-entry {
        margin-bottom: 12px;
      }

      .archive-toggle {
        margin: 8px 0;
      }

      .todo-count {
        color: #4b5563;
        margin: 12px 0;
      }

      .todo-items {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .todo-row {
        border-top: 1px solid #eef0f4;
        justify-content: space-between;
        padding: 10px 0;
      }

      .todo-row label {
        align-items: center;
        display: flex;
        flex: 1;
        gap: 8px;
      }

      .todo-row.done span:first-of-type {
        color: #6b7280;
        text-decoration: line-through;
      }

      .todo-items:not(.showArchived) .todo-row.archived {
        display: none;
      }

      .ng-hide {
        display: none !important;
      }

      .archived-label {
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h3>Dart-authored AngularTS Todos</h3>
      <section class="demo-shell">
        <todo-list></todo-list>
      </section>
    </main>
  </body>
</html>
