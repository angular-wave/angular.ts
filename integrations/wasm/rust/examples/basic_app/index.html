<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AngularTS Rust Todo Demo</title>
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico" />
    <script type="module" src="./.angular-ts/bootstrap.js"></script>
    <style>
      body {
        font:
          14px/1.5 system-ui,
          sans-serif;
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      section {
        margin: 24px 0;
      }

      button {
        cursor: pointer;
        margin: 4px 6px 4px 0;
      }

      input[type="text"] {
        min-width: 240px;
        padding: 6px 8px;
      }

      .demo-shell {
        border: 1px solid #d7dbe3;
        border-radius: 8px;
        padding: 20px;
      }

      .todo-entry,
      .archive-toggle,
      .todo-row {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .todo-entry {
        margin-bottom: 12px;
      }

      .archive-toggle {
        margin: 8px 0;
      }

      .todo-count {
        color: #4b5563;
        margin: 12px 0;
      }

      .todo-app h1 {
        font-size: 1.3rem;
        margin: 0 0 12px;
      }

      .todo-items {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .todo-row {
        border-top: 1px solid #eef0f4;
        justify-content: space-between;
        padding: 10px 0;
      }

      .todo-row label {
        align-items: center;
        display: flex;
        flex: 1;
        gap: 8px;
      }

      .todo-row.done span:first-of-type {
        color: #6b7280;
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <main>
      <h3>Rust-authored AngularTS Todos</h3>
      <section class="demo-info" ng-controller="demoInfo as info">
        <p id="rust-controller-title">{{ info.title }}</p>
      </section>
      <section class="demo-shell">
        <todo-list></todo-list>
      </section>
    </main>
  </body>
</html>
