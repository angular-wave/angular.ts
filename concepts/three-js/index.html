<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + Three.js</title>
    <script type="module" src="/utils/source-bootstrap.js" data-angular-ts-entry="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      canvas {
        border: 1px solid #ddd;
        display: block;
        margin-top: 16px;
      }
    </style>
  </head>
  <body ng-app="threeConcept" ng-controller="DemoCtrl as demo">
    <label>
      Rotation speed
      <input type="range" min="0" max="0.08" step="0.005" ng-model="demo.scene.speed" />
    </label>

    <label>
      Color
      <input type="color" ng-model="demo.scene.color" />
    </label>

    <canvas id="three-view" width="420" height="260"></canvas>
  </body>
</html>
