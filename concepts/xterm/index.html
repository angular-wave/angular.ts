<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + xterm.js</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"
    />
    <script type="module" src="/utils/source-bootstrap.js" data-angular-ts-entry="./app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button {
        margin-right: 8px;
      }

      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(480px, 1fr) 260px;
        margin-top: 16px;
      }

      #terminal-runtime {
        background: #111827;
        border: 1px solid #d1d5db;
        min-height: 260px;
        padding: 8px;
      }

      dl {
        display: grid;
        gap: 8px;
        grid-template-columns: auto 1fr;
        margin: 0;
      }

      dd {
        margin: 0;
      }
    </style>
  </head>
  <body ng-app="xtermConcept" ng-controller="DemoCtrl as demo">
    <button ng-click="demo.connect()">Connect</button>
    <button ng-click="demo.disconnect()">Disconnect</button>
    <button ng-click="demo.sendPing()">Ping</button>
    <button ng-click="demo.clear()">Clear</button>

    <div class="layout">
      <section>
        <h1>Terminal Session</h1>
        <div id="terminal-runtime"></div>
      </section>

      <aside>
        <dl>
          <dt>Status</dt>
          <dd data-testid="terminal-status">{{ demo.terminal.status }}</dd>
          <dt>Connected</dt>
          <dd data-testid="terminal-connected">
            {{ demo.terminal.connected ? 'yes' : 'no' }}
          </dd>
          <dt>Current</dt>
          <dd data-testid="terminal-current">
            {{ demo.terminal.currentCommand || 'none' }}
          </dd>
          <dt>Last</dt>
          <dd data-testid="terminal-last">
            {{ demo.terminal.lastCommand || 'none' }}
          </dd>
          <dt>Lines</dt>
          <dd data-testid="terminal-lines">{{ demo.terminal.lineCount }}</dd>
        </dl>
      </aside>
    </div>
  </body>
</html>
