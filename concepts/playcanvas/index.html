<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + PlayCanvas</title>
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/playcanvas@2.8.0/build/playcanvas.min.js"></script>
    <script src="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button,
      label {
        margin-right: 8px;
      }

      canvas {
        border: 1px solid #ddd;
        display: block;
        margin-top: 16px;
      }
    </style>
  </head>
  <body ng-app="playCanvasConcept" ng-controller="DemoCtrl as demo">
    <button ng-click="demo.toggleSpin()">
      {{ demo.cube.spinning ? 'Pause' : 'Spin' }}
    </button>
    <button ng-click="demo.faster()">Faster</button>
    <button ng-click="demo.slower()">Slower</button>

    <label>
      Color
      <input type="color" ng-model="demo.cube.color" />
    </label>

    <p>
      Speed: {{ demo.cube.speed.toFixed(2) }},
      Angle: {{ demo.cube.angle.toFixed(1) }}
    </p>

    <canvas id="playcanvas-view" width="420" height="260"></canvas>
  </body>
</html>
