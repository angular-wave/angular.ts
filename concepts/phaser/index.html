<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + Phaser</title>
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button {
        margin-right: 8px;
      }

      #phaser-view {
        border: 1px solid #ddd;
        height: 260px;
        margin-top: 16px;
        width: 420px;
      }
    </style>
  </head>
  <body ng-app="phaserConcept" ng-controller="DemoCtrl">
    <button ng-click="move(-24, 0)">Left</button>
    <button ng-click="move(24, 0)">Right</button>
    <button ng-click="move(0, -24)">Up</button>
    <button ng-click="move(0, 24)">Down</button>
    <button ng-click="toggleColor()">Color</button>

    <p>Position: {{ player.x }}, {{ player.y }}</p>
    <div id="phaser-view"></div>
  </body>
</html>
