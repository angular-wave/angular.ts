<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + Konva</title>
    <script type="module" src="/utils/source-bootstrap.js" data-angular-ts-entry="./app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/konva@9.3.20/konva.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button,
      label {
        margin-right: 8px;
      }

      #konva-view {
        border: 1px solid #ddd;
        height: 300px;
        margin-top: 16px;
        width: 640px;
      }
    </style>
  </head>
  <body ng-app="konvaConcept" ng-controller="DemoCtrl as demo">
    <button ng-click="demo.center()">Center</button>
    <button ng-click="demo.toggleShape()">
      {{ demo.shape.kind === 'circle' ? 'Rectangle' : 'Circle' }}
    </button>

    <label>
      Color
      <input type="color" ng-model="demo.shape.color" />
    </label>

    <label>
      Size
      <input type="range" min="24" max="96" ng-model="demo.shape.size" />
    </label>

    <p>
      Shape: {{ demo.shape.kind }},
      Position: {{ demo.shape.x.toFixed(0) }}, {{ demo.shape.y.toFixed(0) }},
      Size: {{ demo.shape.size }}
    </p>

    <div id="konva-view"></div>
  </body>
</html>
