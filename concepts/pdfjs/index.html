<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + PDF.js</title>
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button {
        margin-right: 8px;
      }

      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(520px, 1fr) 260px;
        margin-top: 16px;
      }

      .viewer {
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        max-height: 560px;
        overflow: auto;
        padding: 12px;
      }

      canvas {
        background: white;
        display: block;
      }

      dl {
        display: grid;
        gap: 8px;
        grid-template-columns: auto 1fr;
        margin: 0;
      }

      dd {
        margin: 0;
      }
    </style>
  </head>
  <body ng-app="pdfjsConcept" ng-controller="DemoCtrl as demo">
    <button ng-click="demo.previousPage()">Previous</button>
    <button ng-click="demo.nextPage()">Next</button>
    <button ng-click="demo.zoomOut()">Zoom Out</button>
    <button ng-click="demo.zoomIn()">Zoom In</button>

    <div class="layout">
      <section class="viewer">
        <canvas id="pdf-canvas"></canvas>
      </section>

      <aside>
        <dl>
          <dt>Status</dt>
          <dd data-testid="pdf-status">{{ demo.viewer.status }}</dd>
          <dt>Page</dt>
          <dd data-testid="pdf-page">
            {{ demo.viewer.currentPage }} / {{ demo.viewer.pageCount || 0 }}
          </dd>
          <dt>Zoom</dt>
          <dd data-testid="pdf-scale">
            {{ (demo.viewer.scale * 100).toFixed(0) }}%
          </dd>
          <dt>Renders</dt>
          <dd data-testid="pdf-renders">{{ demo.viewer.renderCount }}</dd>
        </dl>
      </aside>
    </div>
  </body>
</html>
