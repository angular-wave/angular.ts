<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + ECharts</title>
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <script src="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      button,
      label {
        margin-right: 8px;
      }

      #chart-view {
        border: 1px solid #ddd;
        height: 300px;
        margin-top: 16px;
        width: 640px;
      }
    </style>
  </head>
  <body ng-app="echartsConcept" ng-controller="DemoCtrl as demo">
    <button ng-click="demo.randomize()">Randomize</button>
    <button ng-click="demo.selectNext()">Select Next</button>

    <label>
      Color
      <input type="color" ng-model="demo.chart.color" />
    </label>

    <p>
      Selected:
      {{ demo.chart.labels[demo.chart.selectedIndex] }}
      ({{ demo.chart.values[demo.chart.selectedIndex] }})
    </p>

    <div id="chart-view"></div>
  </body>
</html>
