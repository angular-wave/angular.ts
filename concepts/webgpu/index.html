<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AngularTS App Model + WebGPU</title>
    <script src="/dist/angular-ts.umd.min.js"></script>
    <script src="./app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      canvas {
        border: 1px solid #ddd;
        display: block;
        margin-top: 16px;
      }
    </style>
  </head>
  <body ng-app="webgpuConcept" ng-controller="DemoCtrl as demo">
    <label>
      Red
      <input type="range" min="0" max="1" step="0.01" ng-model="demo.clear.red" />
    </label>

    <label>
      Green
      <input type="range" min="0" max="1" step="0.01" ng-model="demo.clear.green" />
    </label>

    <label>
      Blue
      <input type="range" min="0" max="1" step="0.01" ng-model="demo.clear.blue" />
    </label>

    <p id="webgpu-status"></p>
    <canvas id="webgpu-view" width="420" height="260"></canvas>
  </body>
</html>
