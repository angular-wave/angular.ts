<section class="demo-panel native-panel">
  <h2>Native bridge view</h2>
  <p>This compact shell is rendered by the Go backend and compiled by AngularTS.</p>

  <div class="demo-actions">
    <button
      ng-native="share"
      data-event="open"
      data-params="{ title: demo.title, url: demo.url }"
      data-on-result="demo.shareResult = $result"
    >
      Share
    </button>
    <button ng-native="navigation" data-event="visit" data-params="demo.nativeRoute('/native/demo')">Open full backend demo</button>
  </div>

  <p>Share: {{ demo.shareResult.text || "No share yet" }}</p>
</section>
